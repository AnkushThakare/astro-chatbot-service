services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: astro_chatbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    env_file:
      - .env
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/astro_chatbot
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/astro_chatbot
      ASTROLOGY_ENGINE_MODE: stub
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
